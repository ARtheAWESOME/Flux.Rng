<!DOCTYPE html>
<html>
<head>
  <title>RNG Game</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
    }
    #result {
      font-size: 40px;
      margin-top: 20px;
      transition: 0.3s;
    }
    #inventory {
      margin-top: 40px;
      font-size: 20px;
    }
    button {
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }
    .rare { color: #00eaff; }
    .epic { color: #b400ff; }
    .legendary { color: gold; }
  </style>
</head>
<body>

<h1>RNG Roll Game</h1>
<button onclick="roll()">ROLL</button>

<div id="result"></div>

<h2>Inventory</h2>
<div id="inventory"></div>

<script>
let inventory = [];

function roll() {
  const roll = Math.random();
  let item = "";
  let rarity = "";

  if (roll < 0.60) {
    item = "Common Cube";
    rarity = "common";
  } else if (roll < 0.85) {
    item = "Rare Shard";
    rarity = "rare";
  } else if (roll < 0.97) {
    item = "Epic Flame";
    rarity = "epic";
  } else {
    item = "LEGENDARY DRAGON";
    rarity = "legendary";
  }

  inventory.push(item);
  updateUI(item, rarity);
}

function updateUI(item, rarity) {
  const result = document.getElementById("result");
  result.innerHTML = item;

  result.className = rarity;

  const inv = document.getElementById("inventory");
  inv.innerHTML = inventory.join("<br>");
}
</script>

</body>
</html>
